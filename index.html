<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Tesla HUD | Live System</title>
    <style>
        body { 
            background: #000; 
            color: #00ffcc; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden;
            
            /* Background GIF */
            background-image: url('https://miro.medium.com/v2/resize:fit:720/format:webp/0*JaqVrbqTw3cRHrLE.gif'); 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            padding: 60px 5% 0 5%;
        }

        /* Dark overlay for readability */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: -1;
        }

        /* LEFT SIDE: ENERGY BACK (Now permanently visible) */
        .export-side { 
            text-align: left; 
            opacity: 1; 
            transition: 0.5s; 
            border-left: 3px solid #00ff88; 
            padding-left: 15px; 
            z-index: 1;
        }
        .exp-label { font-size: 14px; letter-spacing: 4px; color: #00ff88; margin-bottom: 5px; font-weight: bold; }
        .exp-val { font-size: 100px; font-weight: bold; color: #00ff88; margin: 0; text-shadow: 0 0 20px #00ff88; }
        .exp-sub { color: #00ff88; font-size: 12px; letter-spacing: 2px; opacity: 0.8; }

        /* RIGHT SIDE: HUD */
        .hud { 
            text-align: right; 
            border-right: 3px solid #00ffcc; 
            padding-right: 15px; 
            z-index: 1;
        }
        .label { font-size: 14px; letter-spacing: 4px; opacity: 0.7; }
        .main-num { font-size: 100px; font-weight: bold; margin: 0; text-shadow: 0 0 20px #00ffcc; }
        .today { color: #ff9900; font-size: 24px; margin: 15px 0 30px 0; text-shadow: 0 0 10px #ff9900; }
        
        .row { display: flex; justify-content: flex-end; align-items: center; margin: 12px 0; font-size: 18px; }
        .r-lab { color: #a0a0a0; margin-right: 25px; text-transform: uppercase; font-size: 14px; }
        .r-day { color: #ff9900; width: 85px; font-size: 14px; margin-right: 10px; text-align: right; font-weight: bold; }
        .r-val { width: 110px; font-weight: bold; color: #fff; text-align: right; }
        
        .solar-txt { color: #00ff88 !important; text-shadow: 0 0 10px #00ff88; }
        .vlt { font-size: 12px; margin-top: 40px; opacity: 0.5; letter-spacing: 2px; }
        #status { font-size: 11px; color: #ff0055; margin-top: 10px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="side-l" class="export-side">
        <div class="exp-label">ENERGY BACK</div>
        <div class="exp-val" id="back-val">0.00</div>
        <div class="exp-sub">GRID RECOVERY kW</div>
    </div>

    <div class="hud">
        <div class="label">LIVE SYSTEM LOAD</div>
        <div class="main-num" id="main-val">0.00<span style="font-size:30px">kW</span></div>
        <div class="today">TODAY: <span id="k-val">0.00</span> kWh</div>

        <div class="row"><div class="r-lab">WATER HEATER</div><div class="r-day" id="dg1">0.00</div><div class="r-val" id="g1">0.00 kW</div></div>
        <div class="row"><div class="r-lab">STOVE</div><div class="r-day" id="dg2">0.00</div><div class="r-val" id="g2">0.00 kW</div></div>
        <div class="row solar-txt"><div class="r-lab solar-txt">SOLAR ARRAY</div><div class="r-day" id="dg3">0.00</div><div class="r-val" id="g3">0.00 kW</div></div>
        <div class="row"><div class="r-lab">DRYER</div><div class="r-day" id="dg4">0.00</div><div class="r-val" id="g4">0.00 kW</div></div>
        <div class="row"><div class="r-lab">EV TERMINAL</div><div class="r-day" id="dg5">0.00</div><div class="r-val" id="g5">0.00 kW</div></div>

        <div class="vlt">LINE VOLTAGE: <span id="v">0</span>V</div>
        <div id="status">CONNECTING TO CORE...</div>
    </div>

    <script>
        // Update to your current Public IP
        const socket = new WebSocket('ws://192.168.0.8:81/'); 
        
        socket.onopen = function() {
            document.getElementById('status').innerText = "SYSTEM ONLINE";
            document.getElementById('status').style.color = "#00ffcc";
        };

        socket.onclose = function() {
            document.getElementById('status').innerText = "LINK SEVERED - CHECK SETTINGS";
            document.getElementById('status').style.color = "#ff0055";
        };

        socket.onmessage = function(e) {
            const d = JSON.parse(e.data);
            
            // 1. Update Main Load & Daily Total
            document.getElementById('main-val').innerHTML = d.m.toFixed(2) + '<span style="font-size:30px">kW</span>';
            document.getElementById('k-val').innerText = d.k.toFixed(2);
            document.getElementById('v').innerText = d.v.toFixed(1);

            // 2. Update Component Rows (Current kW and Daily kWh)
            const groups = ['g1','g2','g3','g4','g5'];
            groups.forEach(id => {
                if(document.getElementById(id)) {
                    document.getElementById(id).innerText = d[id].toFixed(2) + " kW";
                    document.getElementById('d' + id).innerText = d['d' + id].toFixed(2);
                }
            });

            // 3. Energy Back Logic (Permanent Display)
            const backDisplay = document.getElementById('back-val');
            if (d.n < 0) {
                // If negative, we are exporting. Show absolute value.
                backDisplay.innerText = Math.abs(d.n).toFixed(2);
                document.getElementById('side-l').style.borderColor = "#00ff88";
            } else { 
                // If positive, we are consuming. Show 0.00 on the back-side.
                backDisplay.innerText = "0.00"; 
                document.getElementById('side-l').style.borderColor = "rgba(0, 255, 136, 0.2)";
            }
        };
    </script>
</body>
</html>
